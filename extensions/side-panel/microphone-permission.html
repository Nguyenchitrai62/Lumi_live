<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enable microphone for Lumi</title>
    <link rel="stylesheet" href="microphone-permission.css" />
  </head>
  <body>
    <main class="permission-card">
      <img src="icons/lumi-sidepanel.png" alt="Lumi" />
      <span class="eyebrow">LUMI LIVE SIDE PANEL</span>
      <h1>Enable microphone</h1>
      <p id="permissionMessage" class="message">Chrome should show an Allow / Block prompt. Choose <strong>Allow</strong> so Lumi can hear your voice.</p>
      <div class="actions">
        <button id="requestMicrophoneButton" class="primary" type="button">Allow microphone</button>
        <button id="openSettingsButton" class="secondary" type="button" hidden>Open this extension's permission settings</button>
      </div>
      <p id="permissionDetail" class="detail">The test audio stream is stopped immediately. Your microphone is only kept open while a Lumi voice session is running.</p>
    </main>
    <script src="microphone-permission.js"></script>
  </body>
</html>
